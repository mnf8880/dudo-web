<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pruebas - Calculadora de Dudo</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #e5e5e5;
    color: #1a1a1a;
    padding: 20px;
    max-width: 700px;
    margin: 0 auto;
  }
  h1 { font-size: 18px; margin-bottom: 14px; }
  #resumen {
    font-weight: 800;
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 14px;
    display: inline-block;
  }
  .resumen-ok { background: #064e3b; color: #fff; }
  .resumen-error { background: #90000b; color: #fff; }
  #resultados {
    background: #fff;
    border: 1px solid #d4d4d4;
    border-radius: 8px;
    padding: 10px 14px;
  }
  .fila-prueba {
    padding: 5px 0;
    font-size: 13px;
    border-bottom: 1px solid #eee;
  }
  .fila-prueba:last-child { border-bottom: none; }
  .fila-prueba.ok { color: #166534; }
  .fila-prueba.error { color: #90000b; font-weight: 700; }
</style>
</head>
<body>
  <h1>Pruebas unitarias: probabilidad y reglas de Dudo</h1>
  <div id="resumen">Ejecutando pruebas…</div>
  <div id="resultados"></div>

  <script src="js/probabilidad.js"></script>
  <script src="js/reglas.js"></script>
  <script src="js/pruebas.js"></script>
</body>
</html>
