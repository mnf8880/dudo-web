<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calculadora de Probabilidades - Dudo</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="main-container">

  <!-- Panel 1: Dados en juego -->
  <div class="panel">
    <div class="panel-title"><span class="panel-num">1</span> Dados en juego</div>
    <div class="total-dice-control">
      <button class="arrow-btn" id="totalUp">⇧</button>
      <div class="total-number" id="totalDiceDisplay">24</div>
      <button class="arrow-btn" id="totalDown">⇩</button>
    </div>
  </div>

  <!-- Panel 2: Mis dados -->
  <div class="panel">
    <div class="panel-title"><span class="panel-num">2</span> Mis dados</div>
    <div class="mydice-grid" id="myDiceGrid"></div>
  </div>

  <!-- Panel 3: Jugada actual -->
  <div class="panel">
    <div class="panel-title"><span class="panel-num">3</span> Jugada actual</div>
    <div class="current-play-control">
      <button class="arrow-btn" id="qtyUp">⇧</button>
      <div class="current-qty" id="currentQtyDisplay">8</div>
      <button class="arrow-btn" id="qtyDown">⇩</button>
    </div>
    <div class="face-selector" id="faceSelector"></div>
    <div class="results-box">
      <div class="result-row">
        <span class="label"><span class="status-dot" id="dotSin"></span> Sin tus dados</span>
        <span class="result-pct" id="pctSin">0%</span>
      </div>
      <div class="result-row">
        <span class="label"><span class="status-dot" id="dotCon"></span> Con tus dados</span>
        <span class="result-pct" id="pctCon">0%</span>
      </div>
    </div>
  </div>

  <!-- Panel 4: Posibles respuestas -->
  <div class="panel panel-full">
    <div class="panel-title"><span class="panel-num">4</span> Posibles respuestas</div>
    <div class="responses-grid" id="responsesGrid"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
